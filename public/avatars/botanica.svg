<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="#5A7A5D"/>
  <!-- Body -->
  <ellipse cx="60" cy="104" rx="24" ry="14" fill="#8B7355"/>
  <ellipse cx="60" cy="104" rx="18" ry="10" fill="#A08868"/>
  <!-- Neck -->
  <rect x="53" y="80" width="14" height="10" rx="3" fill="#E8C4A0"/>
  <!-- Face -->
  <circle cx="60" cy="62" r="24" fill="#F5D6B8"/>
  <!-- Leaf hair -->
  <ellipse cx="44" cy="38" rx="8" ry="16" fill="#3D8B4F" transform="rotate(-20, 44, 38)"/>
  <ellipse cx="60" cy="32" rx="7" ry="18" fill="#4CA060"/>
  <ellipse cx="76" cy="38" rx="8" ry="16" fill="#3D8B4F" transform="rotate(20, 76, 38)"/>
  <ellipse cx="34" cy="46" rx="6" ry="12" fill="#5AB06A" transform="rotate(-35, 34, 46)"/>
  <ellipse cx="86" cy="46" rx="6" ry="12" fill="#5AB06A" transform="rotate(35, 86, 46)"/>
  <!-- Small leaves -->
  <ellipse cx="50" cy="34" rx="5" ry="10" fill="#66B876" transform="rotate(-10, 50, 34)"/>
  <ellipse cx="70" cy="34" rx="5" ry="10" fill="#66B876" transform="rotate(10, 70, 34)"/>
  <!-- Leaf veins -->
  <line x1="60" y1="22" x2="60" y2="42" stroke="#3D8B4F" stroke-width="1" opacity="0.5"/>
  <line x1="44" y1="26" x2="44" y2="46" stroke="#2D6B3F" stroke-width="1" opacity="0.5" transform="rotate(-20, 44, 36)"/>
  <line x1="76" y1="26" x2="76" y2="46" stroke="#2D6B3F" stroke-width="1" opacity="0.5" transform="rotate(20, 76, 36)"/>
  <!-- Eyes -->
  <circle cx="50" cy="62" r="3" fill="#2A1F14"/>
  <circle cx="70" cy="62" r="3" fill="#2A1F14"/>
  <circle cx="51" cy="61" r="1" fill="#FAF8F5"/>
  <circle cx="71" cy="61" r="1" fill="#FAF8F5"/>
  <!-- Gentle smile -->
  <path d="M52 72 Q60 77 68 72" fill="none" stroke="#2A1F14" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="42" cy="68" rx="5" ry="3" fill="#E8A87C" opacity="0.5"/>
  <ellipse cx="78" cy="68" rx="5" ry="3" fill="#E8A87C" opacity="0.5"/>
  <!-- Flower in hand -->
  <line x1="90" y1="80" x2="90" y2="100" stroke="#4CA060" stroke-width="2"/>
  <circle cx="90" cy="78" r="5" fill="#FFD93D"/>
  <circle cx="85" cy="76" r="3" fill="#FF8C69"/>
  <circle cx="95" cy="76" r="3" fill="#FF8C69"/>
  <circle cx="87" cy="82" r="3" fill="#FF8C69"/>
  <circle cx="93" cy="82" r="3" fill="#FF8C69"/>
  <circle cx="90" cy="78" r="2.5" fill="#FFE066"/>
</svg>