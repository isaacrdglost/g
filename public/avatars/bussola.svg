<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="#1B3A4B"/>
  <!-- Compass outer ring -->
  <circle cx="60" cy="62" r="32" fill="#FAF8F5"/>
  <circle cx="60" cy="62" r="30" fill="#E8E0D4"/>
  <circle cx="60" cy="62" r="28" fill="#FAF8F5"/>
  <!-- Compass inner details -->
  <circle cx="60" cy="62" r="22" fill="none" stroke="#D4C8B8" stroke-width="1"/>
  <!-- Cardinal ticks -->
  <line x1="60" y1="35" x2="60" y2="40" stroke="#7A6255" stroke-width="2"/>
  <line x1="60" y1="84" x2="60" y2="89" stroke="#7A6255" stroke-width="2"/>
  <line x1="33" y1="62" x2="38" y2="62" stroke="#7A6255" stroke-width="2"/>
  <line x1="82" y1="62" x2="87" y2="62" stroke="#7A6255" stroke-width="2"/>
  <!-- North arrow (hat/horn) -->
  <polygon points="60,18 54,36 66,36" fill="#D4500A"/>
  <polygon points="60,18 60,36 66,36" fill="#B83D08" opacity="0.7"/>
  <!-- Eyes -->
  <circle cx="51" cy="58" r="3.5" fill="#2A1F14"/>
  <circle cx="69" cy="58" r="3.5" fill="#2A1F14"/>
  <circle cx="52" cy="57" r="1.2" fill="#FAF8F5"/>
  <circle cx="70" cy="57" r="1.2" fill="#FAF8F5"/>
  <!-- Smile -->
  <path d="M52 68 Q60 74 68 68" fill="none" stroke="#2A1F14" stroke-width="2" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="60" cy="62" r="3" fill="#7A6255"/>
  <circle cx="60" cy="62" r="1.5" fill="#D4500A"/>
  <!-- South pointer -->
  <polygon points="60,106 56,88 64,88" fill="#FAF8F5" opacity="0.4"/>
  <!-- Decorative dots -->
  <circle cx="60" cy="10" r="2" fill="#D4500A" opacity="0.6"/>
  <circle cx="80" cy="16" r="1.5" fill="#FAF8F5" opacity="0.3"/>
  <circle cx="40" cy="16" r="1.5" fill="#FAF8F5" opacity="0.3"/>
</svg>