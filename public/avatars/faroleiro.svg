<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="#1A2744"/>
  <!-- Light beam glow -->
  <polygon points="60,18 30,0 90,0" fill="#FFD93D" opacity="0.15"/>
  <polygon points="60,18 40,2 80,2" fill="#FFD93D" opacity="0.2"/>
  <!-- Lighthouse body (character shaped) -->
  <path d="M44 90 L48 40 Q60 36 72 40 L76 90 Z" fill="#FAF8F5"/>
  <!-- Red stripes -->
  <rect x="48" y="52" width="24" height="8" fill="#D4500A" transform="skewX(-2)"/>
  <rect x="46" y="72" width="28" height="8" fill="#D4500A" transform="skewX(-1)"/>
  <!-- Lighthouse top/lantern room -->
  <rect x="50" y="30" width="20" height="12" rx="2" fill="#2A1F14"/>
  <rect x="48" y="28" width="24" height="4" rx="2" fill="#5C4033"/>
  <!-- Light -->
  <circle cx="60" cy="36" r="4" fill="#FFD93D"/>
  <circle cx="60" cy="36" r="6" fill="#FFD93D" opacity="0.3"/>
  <!-- Roof -->
  <polygon points="60,18 46,28 74,28" fill="#D4500A"/>
  <!-- Light beam lines -->
  <line x1="54" y1="34" x2="38" y2="28" stroke="#FFD93D" stroke-width="1" opacity="0.4"/>
  <line x1="66" y1="34" x2="82" y2="28" stroke="#FFD93D" stroke-width="1" opacity="0.4"/>
  <!-- Eyes on lighthouse -->
  <circle cx="54" cy="48" r="3" fill="#2A1F14"/>
  <circle cx="66" cy="48" r="3" fill="#2A1F14"/>
  <circle cx="55" cy="47" r="1" fill="#FAF8F5"/>
  <circle cx="67" cy="47" r="1" fill="#FAF8F5"/>
  <!-- Warm cozy smile -->
  <path d="M54 56 Q60 60 66 56" fill="none" stroke="#2A1F14" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Base/rocks -->
  <ellipse cx="60" cy="94" rx="30" ry="8" fill="#3D5A7A"/>
  <ellipse cx="48" cy="96" rx="8" ry="5" fill="#4A6A8A"/>
  <ellipse cx="72" cy="95" rx="10" ry="6" fill="#4A6A8A"/>
  <!-- Water waves -->
  <path d="M20 105 Q30 100 40 105 Q50 110 60 105 Q70 100 80 105 Q90 110 100 105" fill="none" stroke="#5A8AAA" stroke-width="2" opacity="0.4"/>
  <path d="M15 112 Q25 107 35 112 Q45 117 55 112 Q65 107 75 112 Q85 117 95 112" fill="none" stroke="#5A8AAA" stroke-width="2" opacity="0.3"/>
</svg>