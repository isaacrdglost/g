<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="60" cy="60" r="60" fill="#2A1F14"/>
  <!-- Shield -->
  <path d="M60 86 L38 72 L38 50 L60 42 L82 50 L82 72 Z" fill="#5C4033"/>
  <path d="M60 82 L42 70 L42 54 L60 47 L78 54 L78 70 Z" fill="#7A6255"/>
  <path d="M60 78 L46 68 L46 58 L60 52 L74 58 L74 68 Z" fill="#8B7355"/>
  <!-- Shield emblem (compass rose) -->
  <circle cx="60" cy="64" r="6" fill="none" stroke="#D4A030" stroke-width="1.5"/>
  <polygon points="60,56 58,62 60,60 62,62" fill="#D4A030"/>
  <polygon points="60,72 58,66 60,68 62,66" fill="#D4A030" opacity="0.6"/>
  <!-- Body behind shield -->
  <ellipse cx="60" cy="106" rx="28" ry="14" fill="#3A2A1A"/>
  <!-- Neck -->
  <rect x="53" y="30" width="14" height="8" rx="3" fill="#E8C4A0"/>
  <!-- Face -->
  <circle cx="60" cy="24" r="20" fill="#F5D6B8"/>
  <!-- Branch crown/antlers -->
  <path d="M40 16 L36 4 L32 8 L34 2" fill="none" stroke="#7A6255" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M80 16 L84 4 L88 8 L86 2" fill="none" stroke="#7A6255" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M44 12 L40 6" fill="none" stroke="#7A6255" stroke-width="2" stroke-linecap="round"/>
  <path d="M76 12 L80 6" fill="none" stroke="#7A6255" stroke-width="2" stroke-linecap="round"/>
  <!-- Small leaves on branches -->
  <ellipse cx="32" cy="4" rx="3" ry="2" fill="#5A7A5D" transform="rotate(-30, 32, 4)"/>
  <ellipse cx="88" cy="4" rx="3" ry="2" fill="#5A7A5D" transform="rotate(30, 88, 4)"/>
  <ellipse cx="36" cy="2" rx="2.5" ry="1.5" fill="#4CA060" transform="rotate(-20, 36, 2)"/>
  <ellipse cx="84" cy="2" rx="2.5" ry="1.5" fill="#4CA060" transform="rotate(20, 84, 2)"/>
  <!-- Wise eyes -->
  <circle cx="52" cy="24" r="3" fill="#2A1F14"/>
  <circle cx="68" cy="24" r="3" fill="#2A1F14"/>
  <circle cx="53" cy="23" r="1" fill="#FAF8F5"/>
  <circle cx="69" cy="23" r="1" fill="#FAF8F5"/>
  <!-- Calm wise brows -->
  <path d="M46 18 Q52 16 58 18" fill="none" stroke="#2A1F14" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M62 18 Q68 16 74 18" fill="none" stroke="#2A1F14" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Wise slight smile -->
  <path d="M54 32 Q60 35 66 32" fill="none" stroke="#2A1F14" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Beard hint -->
  <path d="M50 36 Q60 42 70 36" fill="#D4A87C" opacity="0.4"/>
</svg>