  <line x1="64" y1="56" x2="76" y2="56" stroke="#2A1F14" stroke-width="2" stroke-linecap="round"/>
  <!-- Confident smile -->
  <path d="M50 72 Q60 78 70 72" fill="none" stroke="#2A1F14" stroke-width="2" stroke-linecap="round"/>
